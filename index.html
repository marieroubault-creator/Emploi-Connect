<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Match avec ton emploi</title>

<style>
:root{
  --primary:#406BDE;
  --bg:#DBE3FF;
}

*{
  box-sizing:border-box;
  font-family:"Marianne", Verdana, Tahoma, sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  height:100vh;
  display:flex;
  flex-direction:column;
}

html, body{
  height:100%;
}

/* HEADER */
.header-wrap{
  position:fixed;
  top:0;left:0;right:0;
  z-index:10;
}

.header1{
  background:#B0BFF0;
  text-align:center;
  padding:14px;
  font-weight:700;
  font-size:22px;
}

.header2{
  background:white;
  text-align:center;
  padding:12px;
  font-weight:700;
  color:var(--primary);
}

.spacer{height:110px;}

/* FILTERS */
.filters{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px 20px;
}

.filters button{
  border:none;
  padding:8px 14px;
  border-radius:20px;
  background:white;
  font-weight:bold;
}

.filters .active{
  background:var(--primary);
  color:white;
}

/* MAIN */
.screen{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:15px;
}

/* STACK */
.stack{
  width:92vw;
  max-width:420px;
  height:auto;
  aspect-ratio: 3/4;
  max-height:70vh;
  position:relative;
}

/* CARD */
.card{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:22px;
  overflow:hidden;
  background:white;
  box-shadow:0 12px 30px rgba(0,0,0,0.22);
  touch-action:none;
}

/* IMAGE */
.card img{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#fff;
}

/* CONTENT */
.content{
  position:absolute;
  bottom:0;
  width:100%;
  padding:22px;
  background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
}

.content h2,
.content p{
  color:white;
  margin:0;
}

/* BUTTONS */
.actions{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.actions button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
}

.nope{background:#e74c3c;}
.like{background:#2ecc71;}

/* ===================== */
/* MATCH RESPONSIVE FIX */
/* ===================== */

.match{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  justify-content:center;
  align-items:center;

  z-index:999;

  padding:20px;

  opacity:0;
  transition:opacity 0.35s ease;

  overflow:auto;
}

.match.show{
  display:flex;
  opacity:1;
}

/* ⭐ FIX IMPORTANT TABLET / ÉCRAN CENTRÉ PROPRE */
.match-inner{
  width:min(92vw, 420px);
  max-height:min(85vh, 700px);

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;

  padding:20px;

  background:white;
  border-radius:24px;
  box-shadow:0 20px 60px rgba(0,0,0,0.2);
}

/* FLASH */
.match.flash{
  animation:flash 0.6s ease;
}

@keyframes flash{
  0%{background:rgba(255,255,255,1);}
  50%{background:rgba(64,107,222,0.15);}
  100%{background:rgba(255,255,255,0.92);}
}

/* HANDSHAKE */
.handshake{
  font-size:90px;
  animation:pop 0.6s ease;
}

@keyframes pop{
  0%{transform:scale(0);}
  70%{transform:scale(1.3);}
  100%{transform:scale(1);}
}

/* TITRE RESPONSIVE */
#matchText{
  font-size:clamp(22px, 5vw, 42px);
  font-weight:800;
  color:#1d1e3c;
  text-align:center;
}

/* BOUTONS MATCH */
.match a{
  width:100%;
  max-width:280px;
  padding:14px 18px;
  border-radius:14px;
  text-decoration:none;
  font-weight:700;
  display:block;
  text-align:center;
}

.ft-btn{
  background:#406BDE;
  color:white;
}

.company-btn{
  background:#406BDE;
  color:white;
}

/* bouton retour */
.match button{
  margin-top:10px;
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#6C63FF;
  color:white;
  font-weight:700;
}

</style>
</head>

<body>

<div class="header-wrap">
  <div class="header1">Match avec ton emploi</div>
  <div class="header2">France Travail X La Route du Rhum</div>
</div>

<div class="spacer"></div>

<div class="filters" id="filters"></div>

<div class="screen">
  <div class="stack" id="stack"></div>

  <div class="actions">
    <button class="nope" onclick="forceSwipe('left')">❌ Pas pour moi</button>
    <button class="like" onclick="forceSwipe('right')">❤️ J'aime</button>
  </div>
</div>

<div class="match" id="match">
  <div class="match-inner">
    <h1 id="matchText"></h1>
    <button onclick="restart()">Continuer</button>
  </div>
</div>

<script>

let data = {};
let currentList = [];
let currentIndex = 0;

async function loadData(){
  const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSM_YU-q5RRw9vsihxuJaZ-kStFXupQ9bt_dcBXy3-rkIKQj297iAQXyJ_6DcuFkw4XEDRkyZhfEH7a/pub?output=csv");
  const text = await res.text();

  const rows = text.split("\n").slice(1);

  rows.forEach(r=>{
    const c = r.split(",");
    if(!c[0]) return;

    if(!data[c[0]]) data[c[0]]=[];

    data[c[0]].push({
      name:c[1],
      desc:c[2],
      img:c[3],
      url:c[4]
    });
  });

  buildFilters();
  setFilter("all");
}

function buildFilters(){
  const container = document.getElementById("filters");
  container.innerHTML = "";

  const allBtn = document.createElement("button");
  allBtn.textContent = "Tous";
  allBtn.classList.add("active");

  allBtn.onclick = (e)=>{
    setFilter("all");
    setActive(e.target);
  };

  function setActive(btn){
    document.querySelectorAll(".filters button")
      .forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }

  container.appendChild(allBtn);

  Object.keys(data).forEach(cat=>{
    const btn=document.createElement("button");
    btn.textContent=cat;
    btn.onclick=(e)=>{
      setFilter(cat);
      setActive(e.target);
    };
    container.appendChild(btn);
  });
}

function setFilter(cat){
  currentList = [];

  if(cat==="all"){
    Object.values(data).forEach(a=>currentList=currentList.concat(a));
  }else{
    currentList=data[cat];
  }

  currentIndex=0;
  render();
}

function render(){
  const stack=document.getElementById("stack");
  stack.innerHTML="";

  if(currentIndex>=currentList.length){
    stack.innerHTML="<p>Plus de cartes</p>";
    return;
  }

  const c=currentList[currentIndex];

  const card=document.createElement("div");
  card.className="card";

  card.innerHTML=`
  <img src="${c.img}">
  <div class="content">
    <h2>${c.name}</h2>
    <p>${c.desc}</p>
  </div>
`;

  let startX=0;
  let dragging=false;

  card.addEventListener("pointerdown",e=>{
    startX=e.clientX;
    dragging=true;
    card.setPointerCapture(e.pointerId);
    card.style.transition="none";
  });

  card.addEventListener("pointermove",e=>{
    if(!dragging) return;
    let diff=e.clientX-startX;
    card.style.transform=`translateX(${diff}px) rotate(${diff/12}deg)`;
  });

  card.addEventListener("pointerup",e=>{
    dragging=false;
    let diff=e.clientX-startX;
    card.style.transition="0.3s ease";

    if(diff>100) swipe("right");
    else if(diff<-100) swipe("left");
    else card.style.transform="translateX(0)";
  });

  stack.appendChild(card);
}

function swipe(dir){
  const card=document.querySelector(".card");
  if(!card) return;

  const c=currentList[currentIndex];

  card.style.transition="0.3s ease";

  card.style.transform = dir==="right"
    ? "translateX(1200px) rotate(20deg)"
    : "translateX(-1200px) rotate(-20deg)";

  currentIndex++;

  setTimeout(()=>{
    if(dir==="right") showMatch(c);
    else render();
  },300);
}

function showMatch(c){

  const audio = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3");
  audio.play();

  if(navigator.vibrate){
    navigator.vibrate([200,100,200]);
  }

  const m=document.getElementById("match");

  m.innerHTML=`
    <div class="match-inner">
      <div class="handshake">🤝</div>

      <h1 id="matchText">MATCH avec ${c.name}</h1>

      <a class="ft-btn" href="https://recrute.francetravail.fr/page-employeur/" target="_blank">
        Offres France Travail
      </a>

      <a class="company-btn" href="${c.url||"#"}" target="_blank">
        Site de l'entreprise
      </a>

      <button onclick="restart()">Continuer</button>
    </div>
  `;

  m.classList.add("show","flash");
  setTimeout(()=>m.classList.remove("flash"),700);
}

function forceSwipe(dir){
  swipe(dir);
}

function restart(){
  document.getElementById("match").classList.remove("show");
  render();
}

loadData();

</script>
</body>
</html>
