<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Match avec ton emploi</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1D1E3C">
<!-- iOS / Safari -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Match Emploi">
<link rel="apple-touch-icon" href="./icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  /* Brand palette */
  --navy:       #1D1E3C;
  --blue-deep:  #283276;
  --burgundy:   #5C0F38;
  --red:        #D92424;
  --orange:     #DF6E00;
  --sand:       #E6E1DB;
  --blue:       #406BDE;
  --purple:     #69408C;
  --pink:       #EB94C2;
  --coral:      #EB6366;
  --yellow:     #FFCC52;
  --cream:      #F5F2EE;
  --periwinkle: #B0BFF0;
  --lavender:   #D9C9E5;
  --blush:      #F0C9DE;
  --rose-pale:  #F5A39E;
  --butter:     #FFDE8C;
  --off-white:  #FAFAF7;
  --sky:        #DBE3FF;
  --lilac:      #F0E3FA;
  --pink-pale:  #FCE5F2;
  --blush-pale: #FAD9D6;
  --lemon:      #FFF0C7;
  --white:      #FFFFFF;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  height:100%;
  display:flex;
  flex-direction:column;
  overflow-x:hidden;
  font-family:'Nunito', sans-serif;
  /* fond principal : sky → lilac → pink-pale */
  background: linear-gradient(160deg, var(--sky) 0%, var(--lilac) 45%, var(--pink-pale) 100%);
}

/* ======= BACKGROUND ======= */
.bg-canvas{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  overflow:hidden;
}

.blob{
  position:absolute;
  border-radius:50%;
  filter:blur(55px);
  opacity:0.45;
  animation:blobFloat 8s ease-in-out infinite;
}
/* blobs dans la palette */
.blob:nth-child(1){ width:300px;height:300px;background:var(--blush);      top:-60px;  left:-60px;  animation-delay:0s; }
.blob:nth-child(2){ width:240px;height:240px;background:var(--periwinkle);  top:18%;    right:-70px; animation-delay:2s; }
.blob:nth-child(3){ width:200px;height:200px;background:var(--lemon);       bottom:18%; left:-30px;  animation-delay:4s; }
.blob:nth-child(4){ width:220px;height:220px;background:var(--lavender);    bottom:-50px;right:8%;   animation-delay:1s; }
.blob:nth-child(5){ width:160px;height:160px;background:var(--butter);      top:48%;    left:28%;    animation-delay:3s; }

@keyframes blobFloat{
  0%,100%{ transform:translate(0,0) scale(1); }
  33%{ transform:translate(14px,-18px) scale(1.06); }
  66%{ transform:translate(-10px,10px) scale(0.96); }
}

/* vagues basses */
.wave-bottom{
  position:absolute;
  bottom:0; left:-5%;
  width:110%;
  height:120px;
  border-radius:55% 55% 0 0;
  animation:waveAnim 5.5s ease-in-out infinite;
}
.wave-bottom:nth-child(6){ background:var(--lavender); opacity:0.35; bottom:-18px; }
.wave-bottom:nth-child(7){ background:var(--periwinkle); opacity:0.25; bottom:-38px; height:95px; animation-delay:1.8s; }

@keyframes waveAnim{
  0%,100%{ transform:translateX(0) scaleY(1); }
  50%{ transform:translateX(2%) scaleY(1.1); }
}

/* points déco */
.dot{
  position:absolute;
  border-radius:50%;
  animation:twinkle 3s ease-in-out infinite;
}
@keyframes twinkle{
  0%,100%{ opacity:0.15; transform:scale(0.7); }
  50%{ opacity:0.8; transform:scale(1.3); }
}

/* ======= INSTALL BANNER ======= */
#installBanner{
  display:none;
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  z-index:999;
  background:linear-gradient(135deg, var(--navy), var(--purple));
  color:var(--white);
  border-radius:50px;
  padding:12px 20px;
  box-shadow:0 8px 30px rgba(29,30,60,0.45);
  display:none;
  align-items:center;
  gap:12px;
  font-family:'Nunito',sans-serif;
  font-weight:800;
  font-size:14px;
  white-space:nowrap;
  animation:installPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes installPop{
  from{ opacity:0; transform:translateX(-50%) translateY(30px) scale(0.85); }
  to{   opacity:1; transform:translateX(-50%) translateY(0)    scale(1); }
}
#installBanner .install-icon{ font-size:22px; }
#installBtn{
  background:var(--yellow);
  color:var(--navy);
  border:none;
  border-radius:50px;
  padding:8px 18px;
  font-family:'Fredoka One',cursive;
  font-size:15px;
  cursor:pointer;
  transition:transform 0.15s;
}
#installBtn:hover{ transform:scale(1.07); }
#installDismiss{
  background:none;
  border:none;
  color:rgba(255,255,255,0.6);
  font-size:20px;
  cursor:pointer;
  padding:0 4px;
  line-height:1;
}
#installDismiss:hover{ color:var(--white); }

/* ======= HEADER ======= */
.header-wrap{
  position:fixed;
  top:0; left:0; right:0;
  z-index:10;
}

.header1{
  /* navy → blue-deep */
  background:linear-gradient(135deg, var(--navy), var(--blue-deep));
  text-align:center;
  padding:12px 14px;
  font-family:'Fredoka One', cursive;
  font-size:24px;
  color:var(--white);
  letter-spacing:1px;
  text-shadow: 0 2px 0 rgba(0,0,0,0.25);
  box-shadow:0 4px 0 rgba(20,18,50,0.35);
  position:relative;
}
.header1::after{
  content:'🕹️';
  position:absolute;
  right:14px; top:50%;
  transform:translateY(-50%);
  font-size:22px;
}

#installHeaderBtn{
  display:none;
  position:absolute;
  left:12px; top:50%;
  transform:translateY(-50%);
  background:var(--yellow);
  color:var(--navy);
  border:none;
  border-radius:50px;
  padding:6px 14px;
  font-family:'Fredoka One',cursive;
  font-size:13px;
  cursor:pointer;
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
  transition:transform 0.15s;
  white-space:nowrap;
  z-index:20;
}
#installHeaderBtn:hover{ transform:translateY(-50%) scale(1.07); }

.header2{
  background:rgba(255,255,255,0.80);
  backdrop-filter:blur(12px);
  text-align:center;
  padding:9px;
  font-weight:800;
  color:var(--blue-deep);
  font-size:13px;
  letter-spacing:0.5px;
  border-bottom:2px solid var(--periwinkle);
}

.spacer{ height:100px; }

/* ======= FILTERS ======= */
.filters{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:10px 16px;
  scrollbar-width:none;
  position:relative;
  z-index:1;
}
.filters::-webkit-scrollbar{ display:none; }

.filters button{
  border:2.5px solid var(--periwinkle);
  padding:7px 16px;
  border-radius:50px;
  background:rgba(255,255,255,0.72);
  font-weight:800;
  color:var(--blue-deep);
  cursor:pointer;
  font-family:'Nunito',sans-serif;
  white-space:nowrap;
  transition:all 0.2s ease;
  font-size:13px;
  backdrop-filter:blur(6px);
}
.filters button:hover{ transform:scale(1.05); background:var(--white); }
.filters button.active{
  background:linear-gradient(135deg, var(--blue), var(--purple));
  border-color:transparent;
  color:var(--white);
  box-shadow:0 4px 14px rgba(64,107,222,0.35);
  transform:scale(1.05);
}

/* ======= INTRO ======= */
.intro-text{
  text-align:center;
  padding:4px 24px 8px;
  font-size:14px;
  color:var(--blue-deep);
  font-weight:800;
  max-width:380px;
  margin:0 auto;
  position:relative;
  z-index:1;
}

/* ======= SCREEN ======= */
.screen{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  position:relative;
  z-index:1;
  padding:6px 0 14px;
}

/* ======= STACK ======= */
.stack{
  width:95vw;
  max-width:460px;
  aspect-ratio:3/4;
  max-height:72vh;
  position:relative;
}

.stack::before,
.stack::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  border-radius:28px;
  top:0; left:0;
  pointer-events:none;
}
.stack::before{
  transform:rotate(-4deg) translateY(8px);
  z-index:0;
  background:var(--lavender);
  box-shadow:0 8px 24px rgba(105,64,140,0.18);
}
.stack::after{
  transform:rotate(-2deg) translateY(4px);
  z-index:1;
  background:var(--periwinkle);
  box-shadow:0 10px 28px rgba(64,107,222,0.15);
}

/* ======= CARD ======= */
.card{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:28px;
  overflow:hidden;
  background:var(--white);
  box-shadow:0 12px 36px rgba(29,30,60,0.14), 0 2px 8px rgba(0,0,0,0.05);
  touch-action:none;
  z-index:2;
}

.card img{
  width:100%;
  height:100%;
  object-fit:contain;
  background:var(--white);
}

.card-content{
  position:absolute;
  bottom:0;
  width:100%;
  padding:20px;
  /* navy en bas */
  background:linear-gradient(to top, rgba(29,30,60,0.88) 55%, transparent);
}
.card-content h2{
  color:var(--white);
  margin:0 0 4px;
  font-family:'Fredoka One',cursive;
  font-size:22px;
  letter-spacing:0.5px;
}
.card-content p{
  color:var(--periwinkle);
  margin:0;
  font-size:13px;
  font-weight:700;
}

/* swipe labels */
.swipe-label{
  position:absolute;
  top:24px;
  padding:8px 18px;
  border-radius:50px;
  font-family:'Fredoka One',cursive;
  font-size:24px;
  border:4px solid;
  opacity:0;
  pointer-events:none;
  z-index:10;
  transition:opacity 0.1s;
}
.swipe-label.like{
  left:16px;
  color:var(--blue);
  border-color:var(--blue);
  background:rgba(64,107,222,0.1);
  transform:rotate(-12deg);
}
.swipe-label.nope{
  right:16px;
  color:var(--red);
  border-color:var(--red);
  background:rgba(217,36,36,0.1);
  transform:rotate(12deg);
}

/* floating emoji */
.float-emoji{
  position:fixed;
  font-size:32px;
  pointer-events:none;
  z-index:999;
  animation:floatUp 1.2s ease-out forwards;
}
@keyframes floatUp{
  0%{ opacity:1; transform:translateY(0) scale(1) rotate(0deg); }
  100%{ opacity:0; transform:translateY(-150px) scale(1.5) rotate(20deg); }
}

/* ======= BUTTONS ======= */
.actions{ display:flex; gap:20px; }

.actions button{
  padding:14px 22px;
  border:none;
  border-radius:18px;
  color:var(--white);
  font-weight:900;
  cursor:pointer;
  font-family:'Nunito',sans-serif;
  font-size:15px;
  transition:transform 0.15s, box-shadow 0.15s;
  animation:buttonBounce 2.5s ease-in-out infinite;
}
.actions button:nth-child(2){ animation-delay:0.4s; }

@keyframes buttonBounce{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-6px); }
}
.actions button:active{
  transform:scale(0.9) translateY(4px) !important;
  animation:none;
}

/* Nope : coral → red */
.btn-nope{
  background:linear-gradient(135deg, var(--coral), var(--red));
  box-shadow:0 6px 0 var(--burgundy), 0 8px 20px rgba(217,36,36,0.3);
}
/* Like : blue → purple */
.btn-like{
  background:linear-gradient(135deg, var(--blue), var(--purple));
  box-shadow:0 6px 0 var(--blue-deep), 0 8px 20px rgba(64,107,222,0.35);
}

/* ======= MATCH ======= */
.match{
  display:none;
  position:fixed;
  inset:0;
  /* cream → sky → lilac */
  background:linear-gradient(160deg, var(--cream) 0%, var(--sky) 50%, var(--lilac) 100%);
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:14px;
  z-index:999;
  padding:28px 20px;
  overflow:hidden;
}
.match.show{ display:flex; }

#confettiCanvas{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:0;
}

.match > *{ position:relative; z-index:1; }

.match-ring{
  width:clamp(90px,18vw,120px);
  height:clamp(90px,18vw,120px);
  border-radius:50%;
  /* arc-en-ciel palette */
  background:linear-gradient(135deg, var(--pink), var(--yellow), var(--blue), var(--purple));
  display:flex;
  align-items:center;
  justify-content:center;
  animation:matchPop 0.7s cubic-bezier(0.175,0.885,0.32,1.275) both;
  box-shadow:0 0 30px rgba(235,148,194,0.6), 0 0 60px rgba(105,64,140,0.25);
}
.match-ring .inner{
  width:76%;
  height:76%;
  border-radius:50%;
  background:var(--white);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(32px,7vw,52px);
}

@keyframes matchPop{
  0%{ transform:scale(0) rotate(-180deg); opacity:0; }
  70%{ transform:scale(1.2) rotate(10deg); }
  100%{ transform:scale(1) rotate(0deg); opacity:1; }
}

.match-title{
  font-family:'Fredoka One',cursive;
  font-size:clamp(28px,7vw,44px);
  color:var(--navy);
  text-align:center;
  margin:0;
  text-shadow:0 0 20px rgba(176,191,240,0.6), 0 3px 0 rgba(0,0,0,0.07);
  animation:slideUp 0.5s 0.3s ease both;
}

#matchText{
  font-size:clamp(15px,3.5vw,20px);
  font-weight:900;
  color:var(--blue-deep);
  text-align:center;
  margin:0;
  max-width:90vw;
  animation:slideUp 0.5s 0.45s ease both;
}

@keyframes slideUp{
  from{ opacity:0; transform:translateY(24px); }
  to{ opacity:1; transform:translateY(0); }
}

.match a{
  width:min(90vw,300px);
  padding:clamp(12px,2.5vh,16px) 18px;
  border-radius:18px;
  text-decoration:none;
  font-weight:900;
  display:block;
  text-align:center;
  font-size:clamp(14px,2.5vw,16px);
  font-family:'Nunito',sans-serif;
  transition:transform 0.15s, box-shadow 0.15s;
  animation:slideUp 0.5s ease both;
}
.match a:nth-of-type(1){ animation-delay:0.55s; }
.match a:nth-of-type(2){ animation-delay:0.65s; }

/* orange → coral */
.ft-btn{
  background:linear-gradient(135deg, var(--orange), var(--coral));
  color:var(--white);
  box-shadow:0 6px 0 var(--burgundy), 0 8px 24px rgba(223,110,0,0.3);
}
/* blue → purple */
.company-btn{
  background:linear-gradient(135deg, var(--blue), var(--purple));
  color:var(--white);
  box-shadow:0 6px 0 var(--blue-deep), 0 8px 24px rgba(64,107,222,0.3);
}
.match a:hover{ transform:translateY(-3px) scale(1.03); }
.match a:active{ transform:scale(0.96) translateY(3px); }

.match button{
  padding:clamp(10px,2vh,14px) 22px;
  border:2.5px solid var(--periwinkle);
  border-radius:16px;
  background:rgba(255,255,255,0.7);
  color:var(--blue-deep);
  font-weight:900;
  cursor:pointer;
  font-size:clamp(13px,2.5vw,15px);
  font-family:'Nunito',sans-serif;
  backdrop-filter:blur(8px);
  transition:all 0.2s;
  animation:slideUp 0.5s 0.75s ease both;
}
.match button:hover{ background:var(--white); transform:translateY(-2px); }
.match button:active{ transform:scale(0.95); }

/* score badge */
.score-badge{
  position:fixed;
  top:106px;
  right:16px;
  /* yellow → orange */
  background:linear-gradient(135deg, var(--yellow), var(--orange));
  border-radius:50px;
  padding:5px 12px;
  font-family:'Fredoka One',cursive;
  font-size:15px;
  color:var(--navy);
  z-index:11;
  box-shadow:0 4px 12px rgba(255,204,82,0.45);
  animation:scorePop 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes scorePop{
  0%{ transform:scale(0.5); }
  70%{ transform:scale(1.2); }
  100%{ transform:scale(1); }
}

.score-badge{ cursor:pointer; }
.score-badge:hover{ transform:scale(1.08); }
.score-badge:active{ transform:scale(0.95); }

/* ======= RECAP PANEL ======= */
.recap-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(29,30,60,0.55);
  backdrop-filter:blur(4px);
  z-index:100;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.recap-overlay.show{ display:flex; }

.recap-panel{
  background:var(--white);
  border-radius:28px;
  padding:28px 24px 24px;
  width:min(92vw,480px);
  max-height:80vh;
  overflow-y:auto;
  box-shadow:0 20px 60px rgba(29,30,60,0.25);
  animation:slideUp 0.35s ease both;
}
.recap-panel h2{
  font-family:'Fredoka One',cursive;
  color:var(--navy);
  margin:0 0 6px;
  font-size:24px;
  text-align:center;
}
.recap-subtitle{
  text-align:center;
  color:var(--blue-deep);
  font-weight:800;
  font-size:13px;
  margin:0 0 18px;
}
.recap-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:20px;
}
.recap-item{
  display:flex;
  align-items:center;
  gap:12px;
  background:var(--sky);
  border-radius:16px;
  padding:10px 14px;
}
.recap-item-emoji{ font-size:22px; flex-shrink:0; }
.recap-item-name{
  font-weight:900;
  color:var(--navy);
  font-size:15px;
  flex:1;
}
.recap-item-url{
  font-size:12px;
  font-weight:800;
  color:var(--blue);
  text-decoration:none;
  border:2px solid var(--blue);
  border-radius:20px;
  padding:3px 10px;
  white-space:nowrap;
  flex-shrink:0;
}
.recap-item-url:hover{ background:var(--blue); color:white; }
.recap-empty{
  text-align:center;
  color:var(--blue-deep);
  font-weight:800;
  font-size:15px;
  padding:20px 0;
}
.recap-close{
  width:100%;
  padding:12px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:white;
  font-weight:900;
  font-family:'Nunito',sans-serif;
  font-size:15px;
  cursor:pointer;
  box-shadow:0 5px 0 var(--blue-deep);
  transition:transform 0.15s, box-shadow 0.15s;
}
.recap-close:hover{ transform:translateY(-2px); }
.recap-close:active{ transform:translateY(2px); box-shadow:0 2px 0 var(--blue-deep); }

/* ======= TABLET (SM-T510 : ~800px portrait) ======= */
@media (min-width:600px){
  .stack{ width:72vw; max-width:520px; max-height:78vh; }
  .filters button{ font-size:15px; padding:9px 20px; }
  .intro-text{ font-size:16px; }
  .actions button{ font-size:17px; padding:16px 28px; }
  .header1{ font-size:28px; padding:14px; }
  .header2{ font-size:15px; padding:11px; }
  .spacer{ height:114px; }
  .score-badge{ font-size:17px; padding:7px 16px; top:120px; }
}
@media (min-width:750px){
  .stack{ width:66vw; max-width:560px; max-height:80vh; }
}


</style>
</head>
<body>

<div class="bg-canvas">
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="wave-bottom"></div>
  <div class="wave-bottom"></div>
</div>

<div class="header-wrap">
  <div class="header1">
    <button id="installHeaderBtn">📲 Installer</button>
    Match avec ton emploi
  </div>
  <div class="header2">🎮 Le réseau pour l'emploi X La Route du Rhum 🎮</div>
</div>

<div class="spacer"></div>
<div class="filters" id="filters"></div>
<p class="intro-text">👆 Swipe à droite si le métier t'intéresse, à gauche sinon. Un match = une opportunité !</p>

<div class="screen">
  <div class="stack" id="stack"></div>
  <div class="actions">
    <button class="btn-nope" onclick="forceSwipe('left')">❌ Pas pour moi</button>
    <button class="btn-like" onclick="forceSwipe('right')">❤️ J'aime !</button>
  </div>
</div>

<div id="scoreBadge" class="score-badge" style="display:none" onclick="openRecap()"></div>
<div class="match" id="match"></div>

<!-- Recap panel -->
<div class="recap-overlay" id="recapOverlay">
  <div class="recap-panel" id="recapPanel">
    <h2>🏆 Mes Matchs</h2>
    <p class="recap-subtitle" id="recapSubtitle"></p>
    <div class="recap-list" id="recapList"></div>
    <button class="recap-close" onclick="closeRecap()">✅ Fermer</button>
  </div>
</div>

<!-- Install Banner -->
<div id="installBanner">
  <span class="install-icon">📲</span>
  <span>Installe l'appli !</span>
  <button id="installBtn">Installer</button>
  <button id="installDismiss">✕</button>
</div>

<script>
let data={}, currentList=[], currentIndex=0, matchCount=0, matchList=[];

/* ======= PWA INSTALL ======= */
let deferredPrompt = null;
const banner = document.getElementById('installBanner');
const installBtn = document.getElementById('installBtn');
const dismissBtn = document.getElementById('installDismiss');
const installHeaderBtn = document.getElementById('installHeaderBtn');

async function triggerInstall(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  banner.style.display = 'none';
  installHeaderBtn.style.display = 'none';
}

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  banner.style.display = 'flex';
  installHeaderBtn.style.display = 'block';
});

installBtn.addEventListener('click', triggerInstall);
installHeaderBtn.addEventListener('click', triggerInstall);

dismissBtn.addEventListener('click', () => {
  banner.style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  banner.style.display = 'none';
  installHeaderBtn.style.display = 'none';
  deferredPrompt = null;
});

async function loadData(){
  const res=await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSM_YU-q5RRw9vsihxuJaZ-kStFXupQ9bt_dcBXy3-rkIKQj297iAQXyJ_6DcuFkw4XEDRkyZhfEH7a/pub?output=csv");
  const text=await res.text();
  function parseCSVRow(row){
    const result=[];
    let cur='', inQuotes=false;
    for(let i=0;i<row.length;i++){
      const ch=row[i];
      if(ch==='"'){ inQuotes=!inQuotes; }
      else if(ch===','&&!inQuotes){ result.push(cur.trim()); cur=''; }
      else{ cur+=ch; }
    }
    result.push(cur.trim());
    return result;
  }
  text.split("\n").slice(1).forEach(r=>{
    if(!r.trim()) return;
    const c=parseCSVRow(r);
    if(!c[0]) return;
    if(!data[c[0]]) data[c[0]]=[];
    data[c[0]].push({name:c[1],desc:c[2],img:c[3],url:c[4],ftUrl:c[5]});
  });
  buildFilters();
  setFilter("all");
}

function buildFilters(){
  const container=document.getElementById("filters");
  container.innerHTML="";
  const allBtn=document.createElement("button");
  allBtn.textContent="🎯 Tous";
  allBtn.classList.add("active");
  allBtn.onclick=(e)=>{setFilter("all");setActive(e.target);};
  container.appendChild(allBtn);
  Object.keys(data).forEach(cat=>{
    const btn=document.createElement("button");
    btn.textContent=cat;
    btn.onclick=(e)=>{setFilter(cat);setActive(e.target);};
    container.appendChild(btn);
  });
  function setActive(btn){
    document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
}

function setFilter(cat){
  currentList=[];
  if(cat==="all") Object.values(data).forEach(a=>currentList=currentList.concat(a));
  else currentList=data[cat];
  currentIndex=0;
  render();
}

function render(){
  const stack=document.getElementById("stack");
  stack.innerHTML="";
  if(currentIndex>=currentList.length) currentIndex=0;
  if(!currentList.length){ stack.innerHTML=`<p style="color:#283276;text-align:center;font-family:'Fredoka One',cursive;font-size:20px;margin-top:40px;">Plus de cartes 🎴</p>`; return; }
  const c=currentList[currentIndex];
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`
    <img src="${c.img}">
    <div class="swipe-label like">❤️ LIKE</div>
    <div class="swipe-label nope">NOPE ❌</div>
    <div class="card-content"><h2>${c.name}</h2><p>${c.desc}</p></div>
  `;
  let startX=0, dragging=false, lastDiff=0, emojiInterval=null;
  const likeL=card.querySelector('.swipe-label.like');
  const nopeL=card.querySelector('.swipe-label.nope');
  const LIKE=['❤️','🎉','✨','🌟','🚀','🎊','💡','🌈'];
  const NOPE=['💨','😅','🙈','⚡','💫','🌀','😬','👻'];
  function spawnEmoji(dir){
    const em=document.createElement('div');
    em.className='float-emoji';
    em.textContent=(dir==='right'?LIKE:NOPE)[Math.floor(Math.random()*(dir==='right'?LIKE:NOPE).length)];
    const rect=card.getBoundingClientRect();
    em.style.left=(rect.left+rect.width/2+(Math.random()-.5)*80)+'px';
    em.style.top=(rect.top+rect.height/2+(Math.random()-.5)*60)+'px';
    document.body.appendChild(em);
    setTimeout(()=>em.remove(),1300);
  }
  card.addEventListener("pointerdown",e=>{
    startX=e.clientX; dragging=true;
    card.setPointerCapture(e.pointerId);
    card.style.transition="none";
    emojiInterval=setInterval(()=>{ if(Math.abs(lastDiff)>40) spawnEmoji(lastDiff>0?'right':'left'); },300);
  });
  card.addEventListener("pointermove",e=>{
    if(!dragging) return;
    const d=e.clientX-startX; lastDiff=d;
    card.style.transform=`translateX(${d}px) rotate(${d/14}deg)`;
    const p=Math.min(Math.abs(d)/120,1);
    likeL.style.opacity=d>0?p:0;
    nopeL.style.opacity=d<0?p:0;
  });
  card.addEventListener("pointerup",e=>{
    dragging=false; clearInterval(emojiInterval);
    const d=e.clientX-startX;
    card.style.transition="0.3s ease";
    if(d>100) swipe("right");
    else if(d<-100) swipe("left");
    else{ card.style.transform="translateX(0)"; likeL.style.opacity=0; nopeL.style.opacity=0; }
  });
  stack.appendChild(card);
}

function swipe(dir){
  const card=document.querySelector(".card");
  if(!card) return;
  const c=currentList[currentIndex];
  card.style.transition="0.35s ease";
  card.style.transform=dir==="right"?"translateX(1200px) rotate(25deg)":"translateX(-1200px) rotate(-25deg)";
  currentIndex++;
  setTimeout(()=>{ if(dir==="right") showMatch(c); else render(); },350);
}
function forceSwipe(dir){ swipe(dir); }

function showMatch(c){
  matchCount++;
  matchList.push(c);
  updateScore();
  try{ new Audio("https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3").play(); }catch(e){}
  if(navigator.vibrate) navigator.vibrate([200,100,200,100,300]);
  const m=document.getElementById("match");
  m.innerHTML=`
    <canvas id="confettiCanvas"></canvas>
    <div class="match-ring"><div class="inner">🤝</div></div>
    <h1 class="match-title">C'EST UN MATCH !</h1>
    <p id="matchText">Tu as matché avec <strong>${c.name}</strong> !</p>
    ${c.ftUrl && c.ftUrl.trim() && c.ftUrl.trim() !== 'https://recrute.francetravail.fr/page-employeur/'
      ? `<a class="ft-btn" href="${c.ftUrl}" target="_blank">🔍 Offres du réseau </a>`
      : ''}
    <a class="company-btn" href="${c.url||'#'}" target="_blank">🌐 Site de l'entreprise</a>
    <button onclick="restart()">🎮 Continuer à jouer</button>
  `;
  m.classList.add("show");
  launchConfetti();
}

function restart(){
  document.getElementById("match").classList.remove("show");
  render();
}

function updateScore(){
  const b=document.getElementById('scoreBadge');
  b.style.display='block';
  b.textContent=`⭐ ${matchCount} match${matchCount>1?'s':''}`;
  b.style.animation='none'; void b.offsetWidth;
  b.style.animation='scorePop 0.4s cubic-bezier(0.175,0.885,0.32,1.275)';
}

function launchConfetti(){
  const canvas=document.getElementById('confettiCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  /* confettis dans la palette */
  const colors=['#EB94C2','#FFCC52','#406BDE','#EB6366','#B0BFF0','#D9C9E5','#F5A39E','#FFDE8C','#69408C','#DBE3FF'];
  const pieces=Array.from({length:130},()=>({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height-canvas.height,
    r:Math.random()*8+4, d:Math.random()*80+40,
    color:colors[Math.floor(Math.random()*colors.length)],
    tiltAngle:0, tiltAngleInc:Math.random()*0.07+0.05,
    shape:Math.random()>0.5?'circle':'rect',
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.beginPath(); ctx.fillStyle=p.color;
      p.tiltAngle+=p.tiltAngleInc;
      p.y+=Math.cos(frame/20+p.d)+2.5;
      p.x+=Math.sin(frame/30)*2;
      const tilt=Math.sin(p.tiltAngle)*12;
      if(p.shape==='circle'){ ctx.arc(p.x,p.y,p.r,0,Math.PI*2); }
      else{ ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(tilt*Math.PI/180); ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r); ctx.restore(); }
      ctx.fill();
    });
    frame++;
    if(frame<200) requestAnimationFrame(draw);
  }
  draw();
}

/* points déco */
(function(){
  const bg=document.querySelector('.bg-canvas');
  const dotColors=['#EB94C2','#B0BFF0','#FFDE8C','#D9C9E5','#F5A39E','#FFCC52'];
  for(let i=0;i<28;i++){
    const d=document.createElement('div'); d.className='dot';
    const s=Math.random()*10+4;
    d.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*80}%;background:${dotColors[Math.floor(Math.random()*dotColors.length)]};animation-delay:${Math.random()*4}s;animation-duration:${Math.random()*3+2}s;`;
    bg.appendChild(d);
  }
})();

function openRecap(){
  const overlay=document.getElementById('recapOverlay');
  const list=document.getElementById('recapList');
  const sub=document.getElementById('recapSubtitle');
  sub.textContent=matchList.length
    ? `Tu as matché avec ${matchList.length} métier${matchList.length>1?'s':''} 🎉`
    : 'Swipe à droite pour créer tes premiers matchs !';
  list.innerHTML='';
  if(matchList.length===0){
    list.innerHTML=`<div class="recap-empty">Aucun match pour l'instant 😅<br>Continue à swiper !</div>`;
  } else {
    const emojis=['🤝','⭐','🚀','💡','🎯','🌟','🎊','💼','🏅','✨'];
    matchList.forEach((c,i)=>{
      const item=document.createElement('div');
      item.className='recap-item';
      item.innerHTML=`
        <span class="recap-item-emoji">${emojis[i%emojis.length]}</span>
        <span class="recap-item-name">${c.name}</span>
        ${c.url&&c.url.trim()&&c.url.trim()!=='#'
          ? `<a class="recap-item-url" href="${c.url}" target="_blank">Voir 🔗</a>`
          : ''}
      `;
      list.appendChild(item);
    });
  }
  overlay.classList.add('show');
}

function closeRecap(){
  document.getElementById('recapOverlay').classList.remove('show');
}

document.addEventListener('click',e=>{
  const overlay=document.getElementById('recapOverlay');
  if(e.target===overlay) closeRecap();
});

loadData();

  if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js");
  });
}
</script>
</body>
</html>
