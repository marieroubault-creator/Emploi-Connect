<script>

/* BULLES */
for(let i=0;i<20;i++){
  const b=document.createElement("div");
  b.className="bubble";
  const s=10+Math.random()*60;
  b.style.width=s+"px";
  b.style.height=s+"px";
  b.style.left=Math.random()*100+"vw";
  document.body.appendChild(b);
}

/* DATA */
let data = {};

/* 🔗 CHARGEMENT GOOGLE SHEET */
async function loadData(){

  const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSM_YU-q5RRw9vsihxuJaZ-kStFXupQ9bt_dcBXy3-rkIKQj297iAQXyJ_6DcuFkw4XEDRkyZhfEH7a/pub?output=csv");
  
  const text = await res.text();

  const rows = text.split("\n").slice(1);

  data = {};

  rows.forEach(row => {

    if(!row.trim()) return;

    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

    const categorie = cols[0]?.trim();
    const name = cols[1]?.trim();
    const desc = cols[2]?.trim();
    const img = cols[3]?.trim();
    const url = cols[4]?.trim();

    if(!categorie) return;

    if(!data[categorie]) data[categorie] = [];

    data[categorie].push({
      name,
      desc,
      img,
      url
    });

  });

  render();
}

loadData();

let filter="all";
const stack=document.getElementById("stack");

/* vibration */
function vibrate(i=1){
  if(navigator.vibrate) navigator.vibrate(10*i);
}

/* RENDER */
function render(){

  stack.innerHTML="";

  let list=[];
  if(filter==="all"){
    Object.values(data).forEach(arr=>list=list.concat(arr));
  }else{
    list=data[filter]||[];
  }

  list.slice(0,4).forEach((c,i)=>{

    const card=document.createElement("div");
    card.className="card";

    const like=document.createElement("div");
    like.className="badge like-indicator";
    like.textContent="AIME";

    const nope=document.createElement("div");
    nope.className="badge nope-indicator";
    nope.textContent="PAS POUR MOI";

    card.appendChild(like);
    card.appendChild(nope);

    card.innerHTML+=`
      <img src="${c.img}">
      <div class="content">
        <h2>${c.name}</h2>
        <p>${c.desc}</p>
      </div>
    `;

    card.style.transform=`scale(${1-i*0.06}) translateY(${i*12}px)`;

    let startX=0;
    let dragging=false;

    card.addEventListener("pointerdown",e=>{
      startX=e.clientX;
      dragging=true;
    });

    card.addEventListener("pointermove",e=>{
      if(!dragging) return;

      let x=e.clientX-startX;

      card.style.transform=`translateX(${x}px) rotate(${x/20}deg)`;

      if(x>60){
        like.style.display="block";
        nope.style.display="none";
      }else if(x<-60){
        nope.style.display="block";
        like.style.display="none";
      }else{
        like.style.display="none";
        nope.style.display="none";
      }

      vibrate(Math.min(3,Math.abs(x)/80));
    });

    card.addEventListener("pointerup",e=>{
      dragging=false;

      let diff=e.clientX-startX;

      if(diff>120){
        swipeRight(card,c);
      }
      else if(diff<-120){
        swipeLeft(card);
      }
      else{
        card.style.transition="0.3s";
        card.style.transform="translateX(0)";
        like.style.display=nope.style.display="none";
      }
    });

    stack.appendChild(card);
  });
}

/* 👉 MATCH */
function swipeRight(card,c){

  card.style.transition="0.4s ease";
  card.style.transform="translateX(1200px) rotate(30deg)";

  vibrate(15);

  setTimeout(()=>{
    alertMatch(c);
  },250);
}

/* ❌ PAS POUR MOI */
function swipeLeft(card){

  card.style.transition="0.4s ease";
  card.style.transform="translateX(-1200px) rotate(-30deg)";

  vibrate(8);

  const stamp=document.createElement("div");
  stamp.textContent="PAS POUR MOI";
  stamp.style.position="absolute";
  stamp.style.top="40%";
  stamp.style.left="50%";
  stamp.style.transform="translate(-50%,-50%) rotate(-15deg)";
  stamp.style.background="#e74c3c";
  stamp.style.color="white";
  stamp.style.padding="10px 18px";
  stamp.style.borderRadius="10px";
  stamp.style.fontWeight="800";
  stamp.style.fontSize="22px";
  stamp.style.zIndex="10";

  card.appendChild(stamp);

  setTimeout(()=>{
    render();
  },400);
}

/* MATCH UI */
function alertMatch(c){
  const m=document.getElementById("match");
  m.classList.add("show");

  document.getElementById("matchText").textContent="MATCH ! "+c.name;
  document.getElementById("companyLink").href=c.url;
}

/* RESET */
function restart(){
  document.getElementById("match").classList.remove("show");
  render();
}

/* FILTER */
function setFilter(f){
  filter=f;
  document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

</script>
</body>
</html>
